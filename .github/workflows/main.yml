name: Build bpftrace v0.11.0 (Static ARM64)
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          # We need LLVM 14 (default for Ubuntu 22.04)
          sudo apt-get install -y cmake bison flex libelf-dev libpcap-dev \
                                 llvm-14-dev libclang-14-dev zlib1g-dev libbfd-dev \
                                 libreadline-dev libiberty-dev

      - name: Setup NDK r21e
        run: |
          curl -LO https://dl.google.com/android/repository/android-ndk-r21e-linux-x86_64.zip
          unzip -q android-ndk-r21e-linux-x86_64.zip
          echo "NDK_PATH=$(pwd)/android-ndk-r21e" >> $GITHUB_ENV

      - name: Clone and Downgrade bpftrace
        run: |
          git clone --recursive https://github.com/bpftrace/bpftrace.git
          cd bpftrace
          git fetch --all --tags
          git checkout v0.11.0
          echo "BPF_SRC=$(pwd)" >> $GITHUB_ENV

      - name: Clone BCC
        run: |
          git clone --recursive https://github.com/iovisor/bcc.git
          cd bcc
          git checkout v0.17.0
          echo "BCC_SRC=$(pwd)" >> $GITHUB_ENV

      - name: Build BCC (Android)
        run: |
          cd ${{ env.BCC_SRC }}
          mkdir build && cd build
          # Added LLVM_DIR and CMAKE_FIND_ROOT_PATH_MODE flags
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_PATH }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_EXAMPLES=OFF \
            -DENABLE_TESTS=OFF \
            -DLLVM_DIR=/usr/lib/llvm-14/lib/cmake/llvm \
            -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=BOTH
          make -j$(nproc) bcc-static

      - name: Build bpftrace (Android)
        run: |
          cd ${{ env.BPF_SRC }}
          mkdir build && cd build
          
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_PATH }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_BUILD_TYPE=Release \
            -DSTATIC_LINKING=ON \
            -DBUILD_TESTING=OFF \
            -DALLOW_UNSAFE_PROBE=ON \
            -DLIBBCC_LIBRARIES=${{ env.BCC_SRC }}/build/src/cpp/libbcc.a \
            -DLIBBCC_INCLUDE_DIRS=${{ env.BCC_SRC }}/src/cpp \
            -DLLVM_DIR=/usr/lib/llvm-14/lib/cmake/llvm \
            -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=BOTH
          
          make -j$(nproc) bpftrace

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: bpftrace-v0.11.0-S20FE
          path: ${{ env.BPF_SRC }}/build/src/bpftrace
