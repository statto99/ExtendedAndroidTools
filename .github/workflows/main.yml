name: Build bpftools archives
on: [push, pull_request, workflow_dispatch]

jobs:
  build_everything:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Wrapper Repo
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y linux-tools-$(uname -r) linux-tools-generic \
                                 libbpf-dev libpcap-dev llvm-dev libclang-dev \
                                 zlib1g-dev libelf-dev cmake bison flex

      - name: Setup NDK r21e
        run: |
          curl -LO https://dl.google.com/android/repository/android-ndk-r21e-linux-x86_64.zip
          unzip -q android-ndk-r21e-linux-x86_64.zip
          echo "NDK_PATH=$(pwd)/android-ndk-r21e" >> $GITHUB_ENV

      - name: Downgrade bpftrace to v0.11.0
        run: |
          # Find where the repo keeps the bpftrace source (usually 'external/bpftrace')
          BPF_DIR=$(find . -maxdepth 3 -name "bpftrace" -type d | head -n 1)
          cd "$BPF_DIR"
          git fetch --tags
          git checkout v0.11.0
          cd -

      - name: Build via Wrapper Makefile
        run: |
          # The wrapper's Makefile knows how to find its own libbcc
          make bpftrace \
            NDK_PATH=${{ env.NDK_PATH }} \
            NDK_ARCH=arm64 \
            STATIC_LINKING=true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bpftrace-v0.11-android-arm64
          # The output is usually in 'out/' or 'bin/' depending on the wrapper
          path: out/android/arm64/bin/bpftrace
