name: Build bpftrace v0.11 for Android
on: workflow_dispatch

jobs:
  build_bpftrace:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # This ensures all sub-folders/tools are actually downloaded
          submodules: recursive
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y linux-tools-$(uname -r) linux-tools-generic \
                                 libbpf-dev libpcap-dev llvm-dev libclang-dev \
                                 zlib1g-dev libelf-dev cmake bison flex

      - name: Setup NDK r21e
        run: |
          curl -LO https://dl.google.com/android/repository/android-ndk-r21e-linux-x86_64.zip
          unzip -q android-ndk-r21e-linux-x86_64.zip
          echo "NDK_PATH=$(pwd)/android-ndk-r21e" >> $GITHUB_ENV

      - name: Locate and Downgrade bpftrace
        run: |
          # This finds where bpftrace source is, even if it's not in 'external/'
          BPF_DIR=$(find . -maxdepth 3 -name "bpftrace" -type d | head -n 1)
          echo "Found bpftrace in: $BPF_DIR"
          
          if [ -z "$BPF_DIR" ]; then
            echo "Error: Could not find bpftrace source directory."
            exit 1
          fi

          cd "$BPF_DIR"
          git fetch --tags
          git checkout v0.11.0
          cd -

      - name: Build Static Binary
        run: |
          # Using the Makefile provided by your wrapper repo
          make bpftrace \
            NDK_PATH=${{ env.NDK_PATH }} \
            NDK_ARCH=arm64 \
            STATIC_LINKING=true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bpftrace-v0.11-android-arm64
          # Adjust this path if your 'make' output goes somewhere else
          path: out/android/arm64/bin/bpftrace
