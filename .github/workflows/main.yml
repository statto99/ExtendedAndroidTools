name: Build bpftrace v0.11.0 (Static ARM64)
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          # Install the generic versions available in Ubuntu 22.04
          sudo apt-get install -y cmake bison flex libelf-dev libpcap-dev \
                                 llvm-dev libclang-dev zlib1g-dev libbfd-dev \
                                 libreadline-dev libiberty-dev

      - name: Download bpftrace v0.11.0 Source
        run: |
          curl -LO https://github.com/bpftrace/bpftrace/archive/refs/tags/v0.11.0.zip
          unzip v0.11.0.zip
          echo "SOURCE_DIR=$(pwd)/bpftrace-0.11.0" >> $GITHUB_ENV

      - name: Setup NDK r21e
        run: |
          curl -LO https://dl.google.com/android/repository/android-ndk-r21e-linux-x86_64.zip
          unzip -q android-ndk-r21e-linux-x86_64.zip
          echo "NDK_PATH=$(pwd)/android-ndk-r21e" >> $GITHUB_ENV

      - name: Configure and Build
        run: |
          cd ${{ env.SOURCE_DIR }}
          mkdir build && cd build
          
          # Use the NDK CMake toolchain to target Android ARM64
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_PATH }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_BUILD_TYPE=Release \
            -DSTATIC_LINKING=ON \
            -DBUILD_TESTING=OFF \
            -DALLOW_UNSAFE_PROBE=ON
          
          # Build using all CPU cores
          make -j$(nproc) bpftrace

      - name: Upload bpftrace Binary
        uses: actions/upload-artifact@v4
        with:
          name: bpftrace-v0.11.0-arm64
          path: ${{ env.SOURCE_DIR }}/build/src/bpftrace
