name: Build bpftools archives
on: [push, pull_request, workflow_dispatch]

jobs:
  build_bpftrace_static:
    name: Build static bpftrace v0.11.0
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        env:
          - ARCH: arm64
    steps:
      - name: Checkout bpftrace v0.11.0
        uses: actions/checkout@v4
        with:
          repository: bpftrace/bpftrace
          ref: v0.11.0
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          # Note: In v0.11, the script was often named 'install_dependencies.sh' 
          # or just manual apt-get commands. This command ensures the core BPF libs are there.
          sudo apt-get install -y bpftool libbpf-dev libpcap-dev llvm-dev libclang-dev zlib1g-dev libelf-dev

      - name: Setup NDK
        run: |
          # Downloading a slightly older NDK (r21e) is often safer for v0.11 builds
          # but we will try with your current logic first.
          curl -LO https://dl.google.com/android/repository/android-ndk-r21e-linux-x86_64.zip
          unzip -q android-ndk-r21e-linux-x86_64.zip

      - name: Build Static bpftrace
        run: |
          make bpftrace \
            NDK_PATH=`pwd`/android-ndk-r21e \
            NDK_ARCH=${{ matrix.env['ARCH'] }} \
            STATIC_LINKING=true \
            LLVM_TARGETS="BPF;AArch64"
            
      - uses: actions/upload-artifact@v4
        with:
          name: bpftrace-v0.11-android-${{ matrix.env['ARCH'] }}
          path: out/android/${{ matrix.env['ARCH'] }}/bin/bpftrace
