name: Build bpftrace v0.11.0 (Final Fix)
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake bison flex llvm-14-dev libclang-14-dev libelf-dev libfl-dev

      - name: Setup NDK r21e
        run: |
          curl -LO https://dl.google.com/android/repository/android-ndk-r21e-linux-x86_64.zip
          unzip -q android-ndk-r21e-linux-x86_64.zip
          echo "NDK_PATH=$(pwd)/android-ndk-r21e" >> $GITHUB_ENV

      - name: 1. Build LibElf for ARM64 (The Missing Piece)
        run: |
          git clone https://github.com/vbmithr/libelf.git
          cd libelf
          mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_PATH }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29
          make -j$(nproc)
          echo "LIBELF_DIR=$(pwd)" >> $GITHUB_ENV
          echo "LIBELF_INC=$(pwd)/../lib" >> $GITHUB_ENV

      - name: 2. Build BCC Static (Android)
        run: |
          git clone --recursive https://github.com/iovisor/bcc.git
          cd bcc && git checkout v0.17.0
          mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_PATH }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DENABLE_EXAMPLES=OFF -DENABLE_TESTS=OFF \
            -DLLVM_DIR=/usr/lib/llvm-14/lib/cmake/llvm \
            -DLIBELF_LIBRARIES=${{ env.LIBELF_DIR }}/lib/libelf.a \
            -DLIBELF_INCLUDE_DIRS=${{ env.LIBELF_INC }} \
            -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=BOTH
          make -j$(nproc) bcc-static
          echo "BCC_DIR=$(pwd)" >> $GITHUB_ENV

      - name: 3. Build bpftrace v0.11.0
        run: |
          git clone https://github.com/bpftrace/bpftrace.git
          cd bpftrace && git fetch --tags && git checkout v0.11.0
          mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_PATH }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DSTATIC_LINKING=ON -DBUILD_TESTING=OFF \
            -DALLOW_UNSAFE_PROBE=ON \
            -DLLVM_DIR=/usr/lib/llvm-14/lib/cmake/llvm \
            -DLIBBCC_LIBRARIES=${{ env.BCC_SRC }}/build/src/cpp/libbcc.a \
            -DLIBBCC_INCLUDE_DIRS=${{ env.BCC_SRC }}/src/cpp \
            -DLIBELF_LIBRARIES=${{ env.LIBELF_DIR }}/lib/libelf.a \
            -DLIBELF_INCLUDE_DIRS=${{ env.LIBELF_INC }} \
            -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=BOTH
          make -j$(nproc) bpftrace

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: bpftrace-v0.11.0-S20FE
          path: bpftrace/build/src/bpftrace
