name: Build bpftrace v0.11 for Android
on: workflow_dispatch

jobs:
  build_bpftrace:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Android BPF Wrapper
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y linux-tools-$(uname -r) linux-tools-generic \
                                 libbpf-dev libpcap-dev llvm-dev libclang-dev \
                                 zlib1g-dev libelf-dev cmake

      - name: Downgrade bpftrace to v0.11.0
        run: |
          # Move into the submodule directory and switch to the old tag
          cd external/bpftrace
          git fetch --tags
          git checkout v0.11.0
          cd ../..

      - name: Setup NDK r21e
        run: |
          curl -LO https://dl.google.com/android/repository/android-ndk-r21e-linux-x86_64.zip
          unzip -q android-ndk-r21e-linux-x86_64.zip

      - name: Build Static Binary
        run: |
          # We use the wrapper's Makefile which handles the Android C library (Bionic)
          make bpftrace \
            NDK_PATH=`pwd`/android-ndk-r21e \
            NDK_ARCH=arm64 \
            STATIC_LINKING=true

      - name: Upload bpftrace Binary
        uses: actions/upload-artifact@v4
        with:
          name: bpftrace-v0.11-android-arm64
          path: out/android/arm64/bin/bpftrace
